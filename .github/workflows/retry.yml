name: PetDrama — Retry Pending Queue

on:
  schedule:
    # Runs every day at 06:00 UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: petdrama-retry-queue
  cancel-in-progress: false

jobs:
  retry:
    name: Process Retry Queue
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Check if queue has pending items
        id: check
        run: |
          python3 - <<'EOF'
          import json, os, glob
          try:
              files = glob.glob("pending_queue/*.json")
              size = len(files)
          except Exception:
              size = 0
          print(f"Queue size: {size}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"queue_size={size}\n")
          EOF

      - name: Skip — queue is empty
        if: steps.check.outputs.queue_size == '0'
        run: |
          echo "✅ Queue is empty. Nothing to retry today."

      - name: Set up Python
        if: steps.check.outputs.queue_size != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.check.outputs.queue_size != '0'
        run: |
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Write credentials
        if: steps.check.outputs.queue_size != '0'
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: |
          [ -n "$YOUTUBE_TOKEN" ]     && echo "$YOUTUBE_TOKEN"     > token.json  && echo "✅ token.json written"
          [ -n "$INSTAGRAM_COOKIES" ] && echo "$INSTAGRAM_COOKIES" > cookies.txt && echo "✅ cookies.txt written"

      - name: Process retry queue
        if: steps.check.outputs.queue_size != '0'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python retry_queue.py

      - name: Commit updated queue and logs
        if: steps.check.outputs.queue_size != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_queue/ logs/ || true
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "ci: petdrama retry queue processed — run ${{ github.run_id }} [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

      - name: Remove sensitive files
        if: always()
        run: rm -f token.json cookies.txt

      - name: Queue summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob
          try:
              files = glob.glob("pending_queue/*.json")
              remaining = len(files)
              print(f"## 📋 PetDrama Retry Queue Status")
              print(f"Remaining items in queue: **{remaining}**")
              if remaining > 0:
                  for f in files:
                      try:
                          item = json.load(open(f, encoding="utf-8"))
                          print(f"- {item['reel_url']} (attempts: {item.get('attempts', '?')})")
                      except Exception:
                          pass
          except Exception:
              pass
          EOF
