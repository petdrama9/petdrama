name: Petdrama Autopilot Upload

on:
  schedule:
    - cron: '0 0,5,10,15,20 * * *'  # Runs 5 times a day (every 5 hours)
  workflow_dispatch:  # Allows manually running the workflow from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows committing changes back to the repository
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ffmpeg
          # Fix ImageMagick policy issue for MoviePy
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-7/policy.xml || true

      - name: Install project requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r pet_autopilot/requirements.txt

      - name: Clone MoneyPrinterTurbo
        run: |
          git clone https://github.com/harry0703/MoneyPrinterTurbo.git ../MoneyPrinterTurbo
          cd ../MoneyPrinterTurbo
          pip install -r requirements.txt

      - name: Create credentials and environment config
        run: |
          mkdir -p pet_autopilot/credentials
          
          # Create .env file for petdrama pipeline
          cat << EOF > pet_autopilot/.env
          GEMINI_API_KEY=$GEMINI_API_KEY
          GROQ_API_KEYS=$GROQ_API_KEYS
          PEXELS_API_KEY=$PEXELS_API_KEY
          YOUTUBE_CHANNEL_NICHE="Pet Animals Facts (Cats, Dogs, etc.)"
          VIDEOS_PER_DAY=1
          UPLOAD_TIME=09:00
          YOUTUBE_PRIVACY=public
          YOUTUBE_CATEGORY_ID=28
          VIDEO_TAGS=pets,cats,dogs,animals,facts,cute
          MONEY_PRINTER_URL=http://localhost:8080
          VIDEO_LANGUAGE=en
          VOICE_NAME=en-US-ChristopherNeural
          BGM_TYPE=random
          BGM_VOLUME=0.2
          SUBTITLE_ENABLED=true
          MAX_RETRIES=3
          EOF

          # Write YouTube credentials
          echo "$YOUTUBE_CLIENT_SECRETS" > pet_autopilot/credentials/client_secrets.json
          echo "$YOUTUBE_TOKEN_JSON" > pet_autopilot/credentials/token.json

          python -c '
          import os
          
          with open("../MoneyPrinterTurbo/config.example.toml", "r", encoding="utf-8") as f:
              content = f.read()
          
          # Replace keys
          pexels_key = os.environ.get("PEXELS_API_KEY", "")
          content = content.replace("pexels_api_keys = []", "pexels_api_keys = [\"" + pexels_key + "\"]")
          
          content = content.replace("pixabay_api_keys = []", "pixabay_api_keys = [\"56160879-8ab47830d767f433724dacfcd\"]")

          
          gemini_key = os.environ.get("GEMINI_API_KEY", "")
          content = content.replace("gemini_api_key = \"\"", "gemini_api_key = \"" + gemini_key + "\"")
          
          # Use Gemini as the LLM provider for MoneyPrinterTurbo
          content = content.replace("llm_provider = \"openai\"", "llm_provider = \"gemini\"")
          
          groq_keys_str = os.environ.get("GROQ_API_KEYS", "")
          groq_keys = [k.strip() for k in groq_keys_str.split(",") if k.strip()]
          groq_keys_toml = ", ".join(["\"" + k + "\"" for k in groq_keys])
          content = content.replace("groq_api_keys = []", "groq_api_keys = [" + groq_keys_toml + "]")
          
          with open("../MoneyPrinterTurbo/config.toml", "w", encoding="utf-8") as f:
              f.write(content)
          '

      - name: Start MoneyPrinterTurbo Service
        run: |
          cd ../MoneyPrinterTurbo
          sed -i 's/log_level="warning"/log_level="info"/g' main.py || true
          python main.py > server.log 2>&1 &
          # Wait 15 seconds for startup
          sleep 15
          # Output server status
          cat server.log || true

      - name: Run Autopilot Pipeline
        run: |
          cd pet_autopilot
          python main.py --now

      - name: Print MoneyPrinterTurbo Logs on Failure
        if: failure()
        run: |
          cat ../MoneyPrinterTurbo/server.log || true


      - name: Commit and Push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pet_autopilot/data/*.json
          git commit -m "Update pipeline state [skip ci]" || echo "No state changes to commit"
          git pull --rebase origin main
          git push
